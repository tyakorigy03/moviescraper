name: Scrape 2 (manual)

on:
  workflow_dispatch:

jobs:
  scrape2:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: scrape2-${{ github.ref }}
      cancel-in-progress: true
    env:
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_INSERT_ONLY: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run scraper 2
        run: npm run scrape2

      - name: Commit storage changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add storage/*.json logs/*.json 2>/dev/null || true
          git commit -m "chore: update scraper2 state [skip ci]" || echo "No changes to commit"
          git push
