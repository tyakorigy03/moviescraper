name: Scrape (scheduled)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: scrape-${{ github.ref }}
      cancel-in-progress: true
    env:
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      # Only insert new `link`s; don't touch existing rows.
      SUPABASE_INSERT_ONLY: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: npm run scrape

      - name: Commit storage changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add storage/*.json logs/*.json 2>/dev/null || true
          git commit -m "chore: update scrape state [skip ci]" || echo "No changes to commit"
          git push
